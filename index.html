<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ethical Hacking Quiz 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:        #0d0f14;
    --surface:   #161b25;
    --surface2:  #1e2536;
    --border:    #2a3349;
    --text:      #dde3f0;
    --muted:     #6b7a9e;
    --accent:    #4f8ef7;
    --green:     #2ecc71;
    --red:       #e74c3c;
    --green-bg:  rgba(46,204,113,.12);
    --red-bg:    rgba(231,76,60,.12);
    --radius:    14px;
    --mono:      'Space Mono', monospace;
    --sans:      'Syne', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 16px 60px;
  }

  /* ── HEADER ── */
  .header {
    width: 100%;
    max-width: 780px;
    padding: 36px 0 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .header .eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: .2em;
    color: var(--accent);
    text-transform: uppercase;
  }
  .header h1 {
    font-size: clamp(22px, 4vw, 30px);
    font-weight: 800;
    letter-spacing: -.02em;
    text-align: center;
  }
  .header h1 span { color: var(--accent); }

  /* ── PROGRESS ── */
  .progress-wrap {
    width: 100%;
    max-width: 780px;
    margin-bottom: 24px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }
  .progress-meta .score-live { color: var(--green); }
  .bar-bg {
    width: 100%;
    height: 5px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--green));
    border-radius: 99px;
    transition: width .45s cubic-bezier(.4,0,.2,1);
    width: 0%;
  }

  /* ── CHAPTER BADGE ── */
  .chapter-badge {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .15em;
    color: var(--accent);
    background: rgba(79,142,247,.1);
    border: 1px solid rgba(79,142,247,.25);
    padding: 4px 12px;
    border-radius: 99px;
    margin-bottom: 10px;
    text-transform: uppercase;
    display: inline-block;
  }

  /* ── CARD ── */
  .card {
    width: 100%;
    max-width: 780px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 36px 40px 32px;
    position: relative;
    animation: fadeSlideIn .35s ease both;
  }
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .q-number {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 12px;
    letter-spacing: .1em;
  }
  .q-text {
    font-size: clamp(16px, 2.5vw, 18px);
    font-weight: 700;
    line-height: 1.55;
    margin-bottom: 28px;
    letter-spacing: -.01em;
  }

  /* ── OPTIONS ── */
  .options { display: flex; flex-direction: column; gap: 11px; }

  .opt {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: border-color .18s, background .18s, transform .12s;
    position: relative;
    overflow: hidden;
  }
  .opt:hover:not(.locked) {
    border-color: var(--accent);
    background: rgba(79,142,247,.07);
    transform: translateX(3px);
  }
  .opt.locked { cursor: default; }

  .opt-label {
    font-family: var(--mono);
    font-size: 12px;
    width: 26px;
    height: 26px;
    border-radius: 6px;
    background: var(--bg);
    border: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background .18s, border-color .18s, color .18s;
  }
  .opt-text {
    font-size: 14px;
    line-height: 1.45;
    flex: 1;
  }
  .opt-icon {
    font-size: 18px;
    margin-left: auto;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity .2s;
  }

  /* correct */
  .opt.correct {
    border-color: var(--green);
    background: var(--green-bg);
    animation: pulse-green .35s ease;
  }
  .opt.correct .opt-label {
    background: var(--green);
    border-color: var(--green);
    color: #000;
  }
  .opt.correct .opt-icon { opacity: 1; color: var(--green); }

  /* wrong */
  .opt.wrong {
    border-color: var(--red);
    background: var(--red-bg);
    animation: pulse-red .35s ease;
  }
  .opt.wrong .opt-label {
    background: var(--red);
    border-color: var(--red);
    color: #fff;
  }
  .opt.wrong .opt-icon { opacity: 1; color: var(--red); }

  @keyframes pulse-green {
    0%   { box-shadow: 0 0 0 0 rgba(46,204,113,.5); }
    70%  { box-shadow: 0 0 0 10px rgba(46,204,113,0); }
    100% { box-shadow: 0 0 0 0 rgba(46,204,113,0); }
  }
  @keyframes pulse-red {
    0%   { box-shadow: 0 0 0 0 rgba(231,76,60,.5); }
    70%  { box-shadow: 0 0 0 10px rgba(231,76,60,0); }
    100% { box-shadow: 0 0 0 0 rgba(231,76,60,0); }
  }

  /* ── MEMORY ANCHOR ── */
  .anchor {
    margin-top: 18px;
    padding: 14px 18px;
    background: rgba(79,142,247,.07);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    font-size: 13px;
    color: var(--text);
    line-height: 1.6;
    display: none;
    animation: fadeSlideIn .3s ease both;
  }
  .anchor strong { color: var(--accent); font-family: var(--mono); font-size: 11px; letter-spacing:.1em; display:block; margin-bottom:4px; }

  /* ── AUTO-NEXT TIMER BAR ── */
  .timer-bar {
    position: absolute;
    bottom: 0; left: 0;
    height: 3px;
    width: 0%;
    background: var(--accent);
    border-radius: 0 0 var(--radius) var(--radius);
    transition: width 1.6s linear;
  }

  /* ── RESULTS SCREEN ── */
  .results {
    width: 100%;
    max-width: 780px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 52px 40px;
    text-align: center;
    animation: fadeSlideIn .4s ease both;
    display: none;
  }
  .results .trophy { font-size: 62px; margin-bottom: 20px; display:block; }
  .results h2 { font-size: 28px; font-weight: 800; letter-spacing: -.02em; margin-bottom: 10px; }
  .results .score-big {
    font-family: var(--mono);
    font-size: clamp(52px,10vw,80px);
    font-weight: 700;
    line-height: 1;
    margin: 24px 0;
  }
  .results .score-big span { color: var(--accent); }
  .results .grade { font-size: 16px; color: var(--muted); margin-bottom: 32px; }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 14px;
    margin-bottom: 36px;
  }
  .stat-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 12px;
  }
  .stat-box .val {
    font-family: var(--mono);
    font-size: 26px;
    font-weight: 700;
    display: block;
  }
  .stat-box .val.green { color: var(--green); }
  .stat-box .val.red   { color: var(--red);   }
  .stat-box .val.blue  { color: var(--accent); }
  .stat-box .lbl { font-size: 11px; color: var(--muted); margin-top: 4px; display: block; letter-spacing: .07em; }

  .btn-restart {
    font-family: var(--sans);
    font-weight: 700;
    font-size: 15px;
    padding: 14px 36px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    letter-spacing: .03em;
    transition: background .18s, transform .12s;
  }
  .btn-restart:hover { background: #6aa0ff; transform: translateY(-1px); }

  /* ── CHAPTER SELECT ── */
  #chapter-select {
    width: 100%;
    max-width: 780px;
    animation: fadeSlideIn .35s ease both;
  }
  #chapter-select h2 {
    font-size: clamp(20px,4vw,26px);
    font-weight: 800;
    margin-bottom: 8px;
    letter-spacing: -.02em;
  }
  #chapter-select p { color: var(--muted); font-size: 14px; margin-bottom: 28px; }
  .chapter-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }
  .ch-card {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    cursor: pointer;
    transition: border-color .18s, background .18s, transform .12s;
    position: relative;
  }
  .ch-card:hover { border-color: var(--accent); background: rgba(79,142,247,.07); transform: translateY(-2px); }
  .ch-card .ch-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    margin-bottom: 6px;
    letter-spacing: .12em;
  }
  .ch-card .ch-title { font-size: 14px; font-weight: 700; line-height: 1.4; }
  .ch-card .ch-count { font-size: 12px; color: var(--muted); margin-top: 8px; font-family: var(--mono); }
  .ch-card.selected { border-color: var(--accent); background: rgba(79,142,247,.12); }
  .ch-card.selected::after {
    content: '✓';
    position: absolute;
    top: 12px; right: 14px;
    color: var(--accent);
    font-size: 14px;
    font-weight: 700;
  }
  .btn-start-all {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--sans);
    font-weight: 700;
    font-size: 15px;
    padding: 14px 32px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: background .18s, transform .12s;
    margin-right: 12px;
    margin-top: 4px;
  }
  .btn-start-all:hover { background: #6aa0ff; transform: translateY(-1px); }
  .btn-start-sel {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--sans);
    font-weight: 700;
    font-size: 15px;
    padding: 14px 32px;
    background: transparent;
    color: var(--accent);
    border: 1.5px solid var(--accent);
    border-radius: 10px;
    cursor: pointer;
    transition: background .18s, transform .12s;
    margin-top: 4px;
  }
  .btn-start-sel:hover { background: rgba(79,142,247,.1); transform: translateY(-1px); }

  @media (max-width: 560px) {
    .card { padding: 24px 20px 20px; }
    .results { padding: 36px 22px; }
    .stats-grid { grid-template-columns: repeat(2,1fr); }
  }
</style>
</head>
<body>

<div class="header">
  <span class="eyebrow">▸ Interactive Study Tool</span>
  <h1>Ethical Hacking <span>QB 2026</span></h1>
</div>

<!-- CHAPTER SELECT -->
<div id="chapter-select">
  <h2>Select Chapters</h2>
  <p>Choose which chapters to include, or start all at once.</p>
  <div class="chapter-grid" id="chapterGrid"></div>
  <button class="btn-start-all" onclick="startQuiz('all')">▶ Start All Chapters</button>
  <button class="btn-start-sel" onclick="startQuiz('selected')">Start Selected</button>
</div>

<!-- PROGRESS -->
<div class="progress-wrap" id="progressWrap" style="display:none">
  <div class="progress-meta">
    <span id="progressLabel">Question 1 of 0</span>
    <span class="score-live" id="scoreLive">Score: 0</span>
  </div>
  <div class="bar-bg"><div class="bar-fill" id="barFill"></div></div>
</div>

<!-- QUIZ CARD -->
<div id="quizArea" style="display:none">
  <div class="chapter-badge" id="chapterBadge">Chapter 1</div>
  <div class="card" id="card">
    <div class="q-number" id="qNumber">Q1</div>
    <div class="q-text" id="qText"></div>
    <div class="options" id="options"></div>
    <div class="anchor" id="anchor"><strong>📌 MEMORY ANCHOR</strong><span id="anchorText"></span></div>
    <div class="timer-bar" id="timerBar"></div>
  </div>
</div>

<!-- RESULTS -->
<div class="results" id="results">
  <span class="trophy" id="trophy">🎯</span>
  <h2 id="resultsTitle">Quiz Complete!</h2>
  <p class="grade" id="resultsGrade"></p>
  <div class="score-big"><span id="scorePercent">0</span>%</div>
  <div class="stats-grid">
    <div class="stat-box"><span class="val green" id="statCorrect">0</span><span class="lbl">Correct</span></div>
    <div class="stat-box"><span class="val red"   id="statWrong">0</span><span class="lbl">Wrong</span></div>
    <div class="stat-box"><span class="val blue"  id="statTotal">0</span><span class="lbl">Total Q's</span></div>
  </div>
  <button class="btn-restart" onclick="resetToMenu()">↩ Back to Menu</button>
</div>

<script>
/* ============================================================
   QUESTION BANK  — 10 Chapters, all questions verbatim
   ============================================================ */
const CHAPTERS = [
  {
    name: "Chapter 1 — Intro to Ethical Hacking",
    questions: [
      { q:"What is the primary objective of an ethical hacker?", opts:["To steal data for personal gain","To discover vulnerabilities before cybercriminals exploit them","To leak databases to the public","To damage a company's reputation"], correct:1, anchor:"Ethical hackers (white-hat) are paid professionals who discover and report vulnerabilities before malicious actors can exploit them." },
      { q:"Which type of hacker is often referred to as a \"white-hat\" hacker?", opts:["Black Hat Hacker","Red Hat Hacker","Ethical Hacker","None of the above"], correct:2, anchor:"The term 'white-hat' hacker is synonymous with 'Ethical Hacker' — someone who operates with permission to improve security." },
      { q:"According to the \"pillars of ethical hacking,\" what must a tester have before starting?", opts:["A high-speed internet connection","Written permission (Authorization)","The CEO's personal password","A list of all employee names"], correct:1, anchor:"Written authorization is the cornerstone of ethical hacking. Without it, any testing is illegal, regardless of intent." },
      { q:"What is the first phase of the Cyber Kill Chain?", opts:["Weaponization","Installation","Reconnaissance","Exploitation"], correct:2, anchor:"Reconnaissance is always Stage 1. Attackers gather as much information as possible about the target before any action." },
      { q:"In which phase of the Cyber Kill Chain does an attacker establish communication between a compromised system and their remote server to control it?", opts:["Delivery","Command and Control","Weaponization","Reconnaissance"], correct:1, anchor:"Command & Control (C2) is where the attacker sets up a communication channel to remote-control the compromised machine." },
      { q:"Which penetration testing method provides the tester with zero prior knowledge of the system?", opts:["White Box Testing","Gray Box Testing","Black Box Testing","Transparent Testing"], correct:2, anchor:"Black Box = zero knowledge. This simulates a real external attacker who has no inside information about the target." },
      { q:"Which penetration testing method provides the tester with full access to source code and network diagrams?", opts:["Black Box Testing","White Box Testing","Invisible Testing","External Testing"], correct:1, anchor:"White Box = full knowledge. The tester has complete access to architecture, code, and documentation to find deep flaws." },
      { q:"What is a \"Bug Bounty Hunter\"?", opts:["A hacker who creates viruses","A freelance ethical hacker who reports bugs for rewards","A person who fixes hardware issues","A government spy"], correct:1, anchor:"Bug Bounty Hunters are freelance ethical hackers who report security vulnerabilities to companies in exchange for monetary rewards." },
      { q:"What is the purpose of an NDA (Non-Disclosure Agreement) in ethical hacking?", opts:["To give the hacker permission to steal money","To ensure the tester does not leak sensitive client data","To allow the hacker to share findings on social media","To provide the hacker with a free laptop"], correct:1, anchor:"An NDA protects the client by legally preventing the ethical hacker from disclosing sensitive findings discovered during the engagement." },
      { q:"Which of the following is a common social engineering attack?", opts:["SQL Injection","Phishing","Port Scanning","Firewall Configuration"], correct:1, anchor:"Phishing is the classic social engineering attack — it manipulates human psychology via deceptive emails rather than exploiting code." },
      { q:"What should be the first step in a penetration test plan?", opts:["Start hacking immediately","Define Objectives","Delete system logs","Install malware"], correct:1, anchor:"Defining objectives sets the scope and rules of engagement, preventing legal and operational chaos during the test." },
      { q:"Why do organizations use vulnerability scanners?", opts:["To automatically find and prioritize security weaknesses","To slow down the network","To hide data from employees","To replace all human workers"], correct:0, anchor:"Vulnerability scanners automate the detection and prioritization of security weaknesses, saving significant time and reducing human error." },
      { q:"Which of the following are common cyber threats faced by organizations today?", opts:["Ransomware attacks","Phishing campaigns","Data breaches","All of the above"], correct:3, anchor:"Organizations face a multi-front threat landscape: ransomware, phishing, and data breaches are all prevalent and dangerous." },
      { q:"What should a comprehensive penetration testing report cover?", opts:["A summary of the process","A list of discovered vulnerabilities","Recommendations for remediation","All of the above"], correct:3, anchor:"A complete pentest report must include the process summary, all discovered vulnerabilities, and clear remediation steps for the client." },
      { q:"Which of the following are common web application vulnerabilities?", opts:["SQL Injection","Cross-Site Scripting (XSS)","Broken Authentication","All of the above"], correct:3, anchor:"SQL Injection, XSS, and Broken Authentication are all in the OWASP Top 10 — the most critical web application risks." },
      { q:"What are the main goals of ethical hacking?", opts:["Identifying vulnerabilities","Evaluating security controls","Testing incident response readiness","All of the above"], correct:3, anchor:"Ethical hacking serves three core purposes: finding vulnerabilities, testing controls, and assessing how an organization responds to incidents." },
      { q:"True or False: Ethical hacking is a proactive cybersecurity defense strategy.", opts:["True","False"], correct:0, anchor:"Ethical hacking is proactive — it finds and fixes vulnerabilities BEFORE attackers can exploit them, rather than reacting after a breach." },
      { q:"True or False: Social engineering targets human psychology rather than just technology.", opts:["True","False"], correct:0, anchor:"Social engineering exploits human trust, fear, and authority biases. It attacks the 'human OS,' which is often the weakest link." },
      { q:"xTrue or False: A Gray Box test simulates an insider threat or a user with limited access.", opts:["True","False"], correct:0, anchor:"Gray Box testing gives the tester partial knowledge, simulating an insider threat or a user who has some legitimate system access." },
      { q:"True or False: It is the penetration tester's responsibility to return systems back to normal after a test.", opts:["True","False"], correct:0, anchor:"Restoring systems is a key professional obligation. Ethical hackers must leave the environment in its original state after testing." },
    ]
  },
  {
    name: "Chapter 2 — Cyber Kill Chain",
    questions: [
      { q:"Who originally developed the Cyber Kill Chain framework?", opts:["Microsoft","Lockheed Martin","Cisco","Google"], correct:1, anchor:"Lockheed Martin developed the Cyber Kill Chain in 2011, adapting a military target engagement model for cybersecurity." },
      { q:"What is the primary purpose of the Cyber Kill Chain model?", opts:["To help attackers steal more data","To visualize and understand the stages of a cyberattack","To replace all antivirus software","To make the internet faster"], correct:1, anchor:"The Cyber Kill Chain breaks an attack into stages so defenders can understand, detect, and disrupt attacks at any point." },
      { q:"What is the definition of the \"Delivery\" stage?", opts:["Gathering information about the target","Transmitting a malicious payload to the target","Encrypting the victim's hard drive","Selling data on the dark web"], correct:1, anchor:"Delivery is when the attacker transmits the weapon to the victim, commonly via phishing email, USB drop, or malicious website." },
      { q:"In the \"Exploitation\" phase, what is the attacker taking advantage of?", opts:["High internet speeds","Vulnerabilities or weak configurations","New hardware updates","Public holiday schedules"], correct:1, anchor:"Exploitation occurs when the attacker triggers their code by taking advantage of a software vulnerability or misconfiguration." },
      { q:"What does an attacker establish during the \"Command & Control (C2)\" stage?", opts:["A new business partnership","Communication with the compromised system","A legal contract with the victim","A public social media account"], correct:1, anchor:"C2 establishes a remote communication channel so the attacker can issue commands and receive data from the compromised host." },
      { q:"Some experts suggest an 8th stage focused on financial gain. What is it called?", opts:["Optimization","Monetization","Celebration","Replication"], correct:1, anchor:"Monetization is the proposed 8th stage — converting the compromised access or stolen data into financial gain (e.g., ransomware payment)." },
      { q:"Why has cryptocurrency increased the monetization of cyberattacks?", opts:["It is printed by the government","It allows attackers to safely and easily receive ransom funds","It prevents hackers from being attacked","It is used to buy better antivirus software"], correct:1, anchor:"Cryptocurrency provides pseudo-anonymity and is hard to trace, making it the preferred currency for ransomware payments worldwide." },
      { q:"Which security control is specifically mentioned as a way to stop the \"Reconnaissance\" stage?", opts:["Deleting all company emails","Employee awareness and OSINT monitoring","Turning off the office lights","Installing a faster printer"], correct:1, anchor:"Security awareness training and monitoring your own OSINT footprint makes it harder for attackers to gather useful intelligence." },
      { q:"What tool can defenders use to block unwanted connections during the C2 stage?", opts:["Word Processor","Firewall or DNS filtering","Digital Camera","Spreadsheet Software"], correct:1, anchor:"Firewalls and DNS filtering can block the outbound C2 channels, severing the attacker's ability to control the compromised machine." },
      { q:"In a real-world phishing example, which file type is often used to hide a malicious macro?", opts:["A plain text file","An Excel file","A music file","A blank image"], correct:1, anchor:"Excel (and Word) files are commonly weaponized with malicious VBA macros that execute when the victim opens the document." },
      { q:"Which attack type uses a \"Botnet\" to overload a website with traffic?", opts:["SQL Injection","DDoS Attack","Phishing","Zero-Day Attack"], correct:1, anchor:"A DDoS (Distributed Denial of Service) attack uses a botnet — thousands of compromised 'zombie' machines — to flood a target with traffic." },
      { q:"What is the attacker's main task during the \"Installation\" phase?", opts:["Scanning for open ports","Installing malware or backdoors to maintain access","Asking for a ransom payment","Sending a 'Thank You' email"], correct:1, anchor:"During Installation, the attacker plants malware, backdoors, or rootkits to maintain persistent access even after the system reboots." },
      { q:"According to the \"Defender Perspective,\" what must a defender do to be successful?", opts:["Secure only the front door","Secure all possible entry points","Hack the attacker back","Only monitor the CEO's computer"], correct:1, anchor:"A holistic defense approach secures ALL entry points — perimeter, endpoints, users, and cloud — because attackers seek the weakest link." },
      { q:"Why do cyberattacks matter to modern organizations?", opts:["They cause significant financial losses","They result in sensitive data being stolen","They damage the company's reputation","All of the above"], correct:3, anchor:"Cyberattacks have a triple impact: direct financial losses, data theft, and lasting reputational damage that erodes customer trust." },
      { q:"Which of the following are common types of cyberattacks?", opts:["SQL Injection and Phishing","Ransomware and Malware","DDoS and Zero-Day attacks","All of the above"], correct:3, anchor:"The modern threat landscape is vast — SQL Injection, Phishing, Ransomware, Malware, DDoS, and Zero-Day attacks are all active threats." },
      { q:"What can defenders do to detect and prevent attacks during the Reconnaissance stage?", opts:["Use network monitoring","Provide security awareness training","Perform regular vulnerability scans","All of the above"], correct:3, anchor:"Stopping recon requires a layered approach: network monitoring, user education, and proactive vulnerability scanning all play a role." },
      { q:"Attackers use the \"Installation\" phase to establish a foothold using which of the following?", opts:["Backdoors","Trojan horses","Command-line interfaces","All of the above"], correct:3, anchor:"Attackers use backdoors, Trojans, web shells, and direct CLI access during installation to ensure persistent access to the victim." },
      { q:"True or False: Cybersecurity is about breaking the chain before an attacker reaches their objective.", opts:["True","False"], correct:0, anchor:"The entire point of the Kill Chain model is to give defenders a framework to 'break the chain' and stop the attack at any stage." },

/* ============================================================
   QUIZ STATE
   ============================================================ */
let activeQuestions = [];
let currentIndex    = 0;
let score           = 0;
let answered        = 0;
let autoTimer       = null;
let selectedChapters = new Set();

/* ============================================================
   CHAPTER SELECT SCREEN
   ============================================================ */
function buildChapterSelect() {
  const grid = document.getElementById('chapterGrid');
  CHAPTERS.forEach((ch, i) => {
    const card = document.createElement('div');
    card.className = 'ch-card';
    card.dataset.idx = i;
    card.innerHTML = `
      <div class="ch-num">CHAPTER ${i+1}</div>
      <div class="ch-title">${ch.name.split('—')[1]?.trim() || ch.name}</div>
      <div class="ch-count">${ch.questions.length} questions</div>
    `;
    card.onclick = () => toggleChapter(i, card);
    grid.appendChild(card);
  });
}

function toggleChapter(idx, card) {
  if (selectedChapters.has(idx)) {
    selectedChapters.delete(idx);
    card.classList.remove('selected');
  } else {
    selectedChapters.add(idx);
    card.classList.add('selected');
  }
}

function startQuiz(mode) {
  let pool = [];
  if (mode === 'all') {
    CHAPTERS.forEach(ch => pool.push(...ch.questions.map(q => ({...q, chapter: ch.name}))));
  } else {
    if (selectedChapters.size === 0) {
      CHAPTERS.forEach(ch => pool.push(...ch.questions.map(q => ({...q, chapter: ch.name}))));
    } else {
      selectedChapters.forEach(i => {
        CHAPTERS[i].questions.forEach(q => pool.push({...q, chapter: CHAPTERS[i].name}));
      });
    }
  }

  // Shuffle questions
  activeQuestions = pool.sort(() => Math.random() - 0.5);
  currentIndex = 0; score = 0; answered = 0;

  document.getElementById('chapter-select').style.display = 'none';
  document.getElementById('progressWrap').style.display   = 'flex';
  document.getElementById('quizArea').style.display       = 'block';
  document.getElementById('results').style.display        = 'none';

  renderQuestion();
}

/* ============================================================
   RENDER QUESTION
   ============================================================ */
const LETTERS = ['A','B','C','D','E'];

function renderQuestion() {
  if (currentIndex >= activeQuestions.length) { showResults(); return; }

  const q = activeQuestions[currentIndex];
  const total = activeQuestions.length;

  // Progress
  document.getElementById('progressLabel').textContent = `Question ${currentIndex+1} of ${total}`;
  document.getElementById('scoreLive').textContent     = `Score: ${score}`;
  document.getElementById('barFill').style.width       = `${(currentIndex/total)*100}%`;

  // Chapter badge
  document.getElementById('chapterBadge').textContent = q.chapter || '';

  // Q text & number
  document.getElementById('qNumber').textContent = `Q${currentIndex+1}`;
  document.getElementById('qText').textContent   = q.q;

  // Reset anchor
  const anchor = document.getElementById('anchor');
  anchor.style.display = 'none';
  document.getElementById('anchorText').textContent = q.anchor || '';

  // Timer bar reset
  const tb = document.getElementById('timerBar');
  tb.style.transition = 'none';
  tb.style.width = '0%';

  // Shuffle options
  const indices = q.opts.map((_,i) => i);
  const shuffled = indices.sort(() => Math.random() - 0.5);

  const optContainer = document.getElementById('options');
  optContainer.innerHTML = '';

  shuffled.forEach((origIdx, displayPos) => {
    const div = document.createElement('div');
    div.className = 'opt';
    div.dataset.origIdx = origIdx;
    div.dataset.correct = (origIdx === q.correct) ? 'true' : 'false';

    div.innerHTML = `
      <div class="opt-label">${LETTERS[displayPos]}</div>
      <div class="opt-text">${q.opts[origIdx]}</div>
      <div class="opt-icon">${origIdx === q.correct ? '✓' : '✗'}</div>
    `;
    div.onclick = () => handleAnswer(div, q);
    optContainer.appendChild(div);
  });

  // Animate card in
  const card = document.getElementById('card');
  card.style.animation = 'none';
  card.offsetHeight; // reflow
  card.style.animation = 'fadeSlideIn .35s ease both';
}

/* ============================================================
   HANDLE ANSWER
   ============================================================ */
function handleAnswer(clickedDiv, q) {
  // Lock all options
  const allOpts = document.querySelectorAll('.opt');
  allOpts.forEach(o => o.classList.add('locked'));

  const isCorrect = clickedDiv.dataset.correct === 'true';
  if (isCorrect) {
    score++;
    clickedDiv.classList.add('correct');
  } else {
    clickedDiv.classList.add('wrong');
    // highlight the correct one
    allOpts.forEach(o => {
      if (o.dataset.correct === 'true') o.classList.add('correct');
    });
  }
  answered++;

  // Show memory anchor
  const anchor = document.getElementById('anchor');
  anchor.style.display = 'block';

  // Start timer bar
  const tb = document.getElementById('timerBar');
  requestAnimationFrame(() => {
    tb.style.transition = 'width 1.7s linear';
    tb.style.width = '100%';
  });

  // Auto-advance
  clearTimeout(autoTimer);
  autoTimer = setTimeout(() => {
    currentIndex++;
    renderQuestion();
  }, 1850);
}

/* ============================================================
   RESULTS
   ============================================================ */
function showResults() {
  document.getElementById('progressWrap').style.display = 'none';
  document.getElementById('quizArea').style.display     = 'none';
  const r = document.getElementById('results');
  r.style.display = 'block';

  const pct = Math.round((score / activeQuestions.length) * 100);
  document.getElementById('scorePercent').textContent = pct;
  document.getElementById('statCorrect').textContent  = score;
  document.getElementById('statWrong').textContent    = activeQuestions.length - score;
  document.getElementById('statTotal').textContent    = activeQuestions.length;

  let grade, trophy;
  if (pct >= 90)      { grade='Outstanding! 🔥 A+'; trophy='🏆'; }
  else if (pct >= 80) { grade='Excellent work! A';   trophy='🥇'; }
  else if (pct >= 70) { grade='Good job! B';          trophy='🎯'; }
  else if (pct >= 60) { grade='Passing grade. C';     trophy='📚'; }
  else                { grade='Keep studying! 💪';    trophy='🔄'; }

  document.getElementById('trophy').textContent      = trophy;
  document.getElementById('resultsTitle').textContent = grade;
  document.getElementById('resultsGrade').textContent = `You answered ${score} of ${activeQuestions.length} questions correctly.`;
}

function resetToMenu() {
  document.getElementById('results').style.display        = 'none';
  document.getElementById('chapter-select').style.display = 'block';
  selectedChapters.clear();
  document.querySelectorAll('.ch-card').forEach(c => c.classList.remove('selected'));
}

/* ============================================================
   INIT
   ============================================================ */
buildChapterSelect();
</script>
